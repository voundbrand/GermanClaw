name: pr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install hadolint
        run: |
          HADOLINT_URL="https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64"
          curl -fsSL -o /usr/local/bin/hadolint "$HADOLINT_URL"
          EXPECTED=$(curl -fsSL "${HADOLINT_URL}.sha256" | awk '{print $1}')
          ACTUAL=$(sha256sum /usr/local/bin/hadolint | awk '{print $1}')
          [ "$EXPECTED" = "$ACTUAL" ] || { echo "::error::hadolint checksum mismatch"; exit 1; }
          chmod +x /usr/local/bin/hadolint

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          cd nemoclaw && npm install
          cd ../nemoclaw-blueprint && uv sync --extra dev

      - name: Build TypeScript plugin
        run: cd nemoclaw && npm run build

      - name: Run all hooks (pre-commit + pre-push)
        run: npx prek run --all-files --stage pre-push

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          cd nemoclaw && npm install

      - name: Build TypeScript plugin
        run: cd nemoclaw && npm run build

      - name: Run all unit tests with coverage
        run: npx vitest run --coverage

      - name: Check coverage ratchet
        run: bash scripts/check-coverage-ratchet.sh

  test-e2e-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build sandbox test image
        run: docker build -f test/Dockerfile.sandbox -t nemoclaw-sandbox-test .

      - name: Run sandbox E2E tests
        run: docker run --rm -v "${{ github.workspace }}/test:/opt/test" nemoclaw-sandbox-test /opt/test/e2e-test.sh

  validate-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate blueprint and policy
        run: python3 test/validate-blueprint.py
